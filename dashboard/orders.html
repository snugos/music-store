<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orders — Artist Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0a; color: #fff; font-family: -apple-system, sans-serif; min-height: 100vh; }
    a { color: inherit; text-decoration: none; }
    .layout { display: flex; min-height: 100vh; }
    .sidebar { width: 240px; background: #111; border-right: 1px solid #1a1a1a; padding: 2rem 0; flex-shrink: 0; position: fixed; height: 100vh; }
    .sidebar-logo { padding: 0 1.5rem 2rem; font-size: 1.1rem; font-weight: 800; border-bottom: 1px solid #1a1a1a; margin-bottom: 1.5rem; }
    .sidebar-logo span { color: #555; }
    .sidebar-nav { display: flex; flex-direction: column; }
    .nav-item { padding: 0.75rem 1.5rem; font-size: 0.9rem; color: #888; display: flex; align-items: center; gap: 0.75rem; transition: all 0.15s; }
    .nav-item:hover { color: #fff; background: #161616; }
    .nav-item.active { color: #fff; background: #1a1a1a; border-right: 2px solid #fff; }
    .main { flex: 1; margin-left: 240px; padding: 2rem 3rem; }
    .header { margin-bottom: 2.5rem; }
    .header h1 { font-size: 1.8rem; font-weight: 800; }
    
    /* Stats row */
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem; margin-bottom: 2rem; }
    .stat { background: #111; border-radius: 10px; padding: 1.25rem; border: 1px solid #1a1a1a; }
    .stat-label { font-size: 0.7rem; color: #555; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.4rem; }
    .stat-value { font-size: 1.5rem; font-weight: 700; }
    .stat-note { font-size: 0.7rem; color: #444; }

    /* Orders table */
    .card { background: #111; border-radius: 12px; border: 1px solid #1a1a1a; overflow: hidden; }
    .card-header { padding: 1.25rem 1.5rem; border-bottom: 1px solid #1a1a1a; font-weight: 600; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; font-size: 0.7rem; color: #555; text-transform: uppercase; letter-spacing: 0.1em; padding: 0.85rem 1.5rem; border-bottom: 1px solid #1a1a1a; }
    td { padding: 1rem 1.5rem; font-size: 0.85rem; border-bottom: 1px solid #111; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #0f0f0f; }
    .email { color: #888; }
    .badge { padding: 0.25rem 0.6rem; border-radius: 4px; font-size: 0.7rem; font-weight: 600; }
    .badge-completed { background: #0f2a1a; color: #2ecc71; }
    .badge-pending { background: #2a2a0a; color: #f1c40f; }
    .badge-refunded { background: #2a1a1a; color: #e74c3c; }
    .amount { font-weight: 600; }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-logo">market<span>.place</span></div>
      <nav class="sidebar-nav">
        <a href="/music-store/dashboard/" class="nav-item">📊 Overview</a>
        <a href="/music-store/dashboard/albums.html" class="nav-item">💿 Albums</a>
        <a href="/music-store/dashboard/albums-new.html" class="nav-item">➕ New Album</a>
        <a href="/music-store/dashboard/orders.html" class="nav-item active">📦 Orders</a>
        <a href="/music-store/dashboard/settings.html" class="nav-item">⚙️ Settings</a>
      </nav>
    </aside>
    <main class="main">
      <div class="header">
        <h1>Orders</h1>
      </div>
      <div class="stats-row" id="statsRow">
        <div class="stat"><div class="stat-label">Total Revenue</div><div class="stat-value" id="totalRevenue">$0</div></div>
        <div class="stat"><div class="stat-label">This Month</div><div class="stat-value" id="monthRevenue">$0</div></div>
        <div class="stat"><div class="stat-label">Total Orders</div><div class="stat-value" id="totalOrders">0</div></div>
        <div class="stat"><div class="stat-label">Avg Order</div><div class="stat-value" id="avgOrder">$0</div></div>
      </div>
      <div class="card">
        <div class="card-header">Recent Orders</div>
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Album</th>
              <th>Customer</th>
              <th>Amount</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="ordersBody">
            <tr><td colspan="5" style="color:#444;text-align:center;padding:2rem;">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>
  <script>
    const token = localStorage.getItem('auth_token');
    if (!token) { window.location.href = '/music-store/login.html'; }

    async function loadOrders() {
      try {
        const res = await fetch('/api/orders', { headers: { 'Authorization': 'Bearer ' + token } });
        const data = await res.json();
        const orders = data.orders || [];

        document.getElementById('totalOrders').textContent = orders.length;
        
        const completedOrders = orders.filter(o => o.status === 'completed');
        const totalRev = completedOrders.reduce((sum, o) => sum + (o.artist_payout_cents || 0), 0) / 100;
        document.getElementById('totalRevenue').textContent = '$' + totalRev.toFixed(2);
        document.getElementById('avgOrder').textContent = orders.length ? '$' + (totalRev / orders.length).toFixed(2) : '$0';

        // Month revenue
        const now = new Date();
        const monthOrders = completedOrders.filter(o => new Date(o.created_at).getMonth() === now.getMonth());
        document.getElementById('monthRevenue').textContent = '$' + (monthOrders.reduce((s, o) => s + (o.artist_payout_cents || 0), 0) / 100).toFixed(2);

        const tbody = document.getElementById('ordersBody');
        if (!orders.length) {
          tbody.innerHTML = '<tr><td colspan="5" style="color:#444;text-align:center;padding:2rem;">No orders yet</td></tr>';
          return;
        }

        tbody.innerHTML = orders.map(o => `
          <tr>
            <td>${formatDate(o.created_at)}</td>
            <td>${escapeHtml(o.album_title || 'Unknown')}</td>
            <td class="email">${escapeHtml(o.customer_email)}</td>
            <td class="amount">$${((o.artist_payout_cents || 0) / 100).toFixed(2)}</td>
            <td><span class="badge badge-${o.status}">${o.status}</span></td>
          </tr>
        `).join('');
      } catch (e) {
        document.getElementById('ordersBody').innerHTML = '<tr><td colspan="5" style="color:#e74c3c;text-align:center;padding:2rem;">Error loading orders</td></tr>';
      }
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str || '';
      return div.innerHTML;
    }

    function formatDate(str) {
      return new Date(str).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    loadOrders();
  </script>
</body>
</html>
