<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Albums — Artist Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0a; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }
    a { color: inherit; text-decoration: none; }
    
    .layout { display: flex; min-height: 100vh; }
    
    /* Sidebar */
    .sidebar { width: 240px; background: #111; border-right: 1px solid #1a1a1a; padding: 2rem 0; flex-shrink: 0; position: fixed; height: 100vh; overflow-y: auto; }
    .sidebar-logo { padding: 0 1.5rem 2rem; font-size: 1.1rem; font-weight: 800; border-bottom: 1px solid #1a1a1a; margin-bottom: 1.5rem; letter-spacing: -0.02em; }
    .sidebar-logo span { color: #555; }
    .sidebar-nav { display: flex; flex-direction: column; }
    .nav-item { padding: 0.75rem 1.5rem; font-size: 0.9rem; color: #888; display: flex; align-items: center; gap: 0.75rem; transition: all 0.15s; border-left: 2px solid transparent; }
    .nav-item:hover { color: #fff; background: #161616; }
    .nav-item.active { color: #fff; background: #1a1a1a; border-left-color: #fff; }
    .nav-item .icon { font-size: 1.1rem; }
    .sidebar-footer { margin-top: auto; padding: 1.5rem; border-top: 1px solid #1a1a1a; }
    .sidebar-footer a { display: flex; align-items: center; gap: 0.5rem; font-size: 0.8rem; color: #555; }
    .sidebar-footer a:hover { color: #888; }

    /* Main */
    .main { flex: 1; margin-left: 240px; padding: 2.5rem 3rem; min-width: 0; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2.5rem; }
    .header h1 { font-size: 1.8rem; font-weight: 800; letter-spacing: -0.03em; }
    .header p { font-size: 0.9rem; color: #666; margin-top: 0.25rem; }
    
    .btn { padding: 0.7rem 1.3rem; border-radius: 8px; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.15s; border: none; display: inline-flex; align-items: center; gap: 0.5rem; }
    .btn-primary { background: #fff; color: #000; }
    .btn-primary:hover { opacity: 0.85; }
    .btn-secondary { background: #1a1a1a; color: #fff; border: 1px solid #333; }
    .btn-secondary:hover { border-color: #555; }
    
    /* Albums Grid */
    .albums-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; }
    .album-card { background: #111; border-radius: 14px; overflow: hidden; border: 1px solid #1e1e1e; transition: transform 0.2s, border-color 0.2s; }
    .album-card:hover { transform: translateY(-4px); border-color: #333; }
    
    .album-thumb { aspect-ratio: 1; background: linear-gradient(135deg, #1a1a2e, #16213e); display: flex; align-items: center; justify-content: center; font-size: 3.5rem; overflow: hidden; position: relative; }
    .album-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .album-thumb .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s; }
    .album-card:hover .overlay { opacity: 1; }
    
    .album-info { padding: 1.25rem; }
    .album-title { font-weight: 700; font-size: 1rem; margin-bottom: 0.35rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .album-meta { font-size: 0.8rem; color: #666; margin-bottom: 0.75rem; display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
    .album-meta .dot { width: 3px; height: 3px; background: #444; border-radius: 50%; }
    .album-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid #1a1a1a; }
    
    .status-badge { font-size: 0.7rem; padding: 0.3rem 0.65rem; border-radius: 20px; font-weight: 600; }
    .status-published { background: rgba(46, 204, 113, 0.15); color: #2ecc71; }
    .status-draft { background: #1a1a1a; color: #555; }
    
    .album-actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .btn-sm { padding: 0.45rem 0.85rem; font-size: 0.75rem; background: #1a1a1a; border: 1px solid #2a2a2a; color: #aaa; border-radius: 6px; cursor: pointer; transition: all 0.15s; }
    .btn-sm:hover { border-color: #555; color: #fff; background: #222; }
    .btn-sm.danger { color: #e74c3c; border-color: rgba(231, 76, 60, 0.3); background: rgba(231, 76, 60, 0.08); }
    .btn-sm.danger:hover { background: rgba(231, 76, 60, 0.2); border-color: #e74c3c; }
    
    /* Empty State */
    .empty-state { text-align: center; padding: 5rem 2rem; }
    .empty-state .icon { font-size: 4rem; margin-bottom: 1.5rem; opacity: 0.5; }
    .empty-state h3 { font-size: 1.3rem; color: #888; margin-bottom: 0.5rem; }
    .empty-state p { color: #444; margin-bottom: 1.5rem; max-width: 300px; margin-left: auto; margin-right: auto; line-height: 1.5; }
    
    /* Toast */
    .toast { position: fixed; bottom: 2rem; right: 2rem; padding: 1rem 1.5rem; border-radius: 10px; font-size: 0.9rem; font-weight: 500; transform: translateY(100px); opacity: 0; transition: all 0.3s; z-index: 1000; }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { background: #1a3a2a; color: #2ecc71; border: 1px solid rgba(46, 204, 113, 0.3); }
    .toast.error { background: #3a1a1a; color: #e74c3c; border: 1px solid rgba(231, 76, 60, 0.3); }

    /* Responsive */
    @media (max-width: 900px) {
      .sidebar { width: 200px; }
      .main { margin-left: 200px; padding: 2rem; }
    }
    @media (max-width: 600px) {
      .sidebar { display: none; }
      .main { margin-left: 0; padding: 1.5rem; }
      .albums-grid { grid-template-columns: 1fr; }
      .header { flex-direction: column; gap: 1rem; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-logo">market<span>.place</span></div>
      <nav class="sidebar-nav">
        <a href="/music-store/dashboard/" class="nav-item">
          <span class="icon">📊</span> Overview
        </a>
        <a href="/music-store/dashboard/albums.html" class="nav-item active">
          <span class="icon">💿</span> Albums
        </a>
        <a href="/music-store/dashboard/albums-new.html" class="nav-item">
          <span class="icon">➕</span> New Album
        </a>
        <a href="/music-store/dashboard/orders.html" class="nav-item">
          <span class="icon">📦</span> Orders
        </a>
        <a href="/music-store/dashboard/settings.html" class="nav-item">
          <span class="icon">⚙️</span> Settings
        </a>
      </nav>
      <div class="sidebar-footer">
        <a href="/music-store/browse.html">
          <span>←</span> Back to Store
        </a>
      </div>
    </aside>

    <main class="main">
      <div class="header">
        <div>
          <h1>Your Albums</h1>
          <p id="albumCount">Loading...</p>
        </div>
        <a href="/music-store/dashboard/albums-new.html" class="btn btn-primary">+ New Album</a>
      </div>
      
      <div class="albums-grid" id="albumsGrid">
        <div class="empty-state">
          <div class="icon">💿</div>
          <h3>Loading...</h3>
        </div>
      </div>
    </main>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const token = localStorage.getItem('auth_token');
    if (!token) { window.location.href = '/music-store/login.html'; }

    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = `toast ${type} show`;
      setTimeout(() => { toast.classList.remove('show'); }, 3000);
    }

    async function loadAlbums() {
      try {
        const res = await fetch('/api/albums?mine=true', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        const data = await res.json();
        
        if (!res.ok) {
          throw new Error(data.error || 'Failed to load albums');
        }
        
        const albums = data.albums || [];
        const grid = document.getElementById('albumsGrid');
        const countEl = document.getElementById('albumCount');
        
        const publishedCount = albums.filter(a => a.is_published).length;
        countEl.textContent = `${albums.length} album${albums.length !== 1 ? 's' : ''} · ${publishedCount} published`;

        if (albums.length === 0) {
          grid.innerHTML = `
            <div class="empty-state">
              <div class="icon">💿</div>
              <h3>No albums yet</h3>
              <p>Create your first album to start selling your music.</p>
              <a href="/music-store/dashboard/albums-new.html" class="btn btn-primary">Create Album</a>
            </div>
          `;
          return;
        }

        grid.innerHTML = albums.map(album => `
          <div class="album-card">
            <div class="album-thumb">
              ${album.cover_image_url 
                ? `<img src="${escapeHtml(album.cover_image_url)}" alt="${escapeHtml(album.title)}">` 
                : '💿'}
              <div class="overlay">
                <a href="/music-store/album/${album.id}.html" target="_blank" class="btn-sm" style="background:#fff;color:#000;border:none;font-weight:600;">View</a>
              </div>
            </div>
            <div class="album-info">
              <div class="album-title">${escapeHtml(album.title)}</div>
              <div class="album-meta">
                <span>${album.track_count || 0} track${album.track_count !== 1 ? 's' : ''}</span>
                <span class="dot"></span>
                <span>${album.is_name_your_price ? 'Name your price' : '$' + ((album.price_cents || 0) / 100).toFixed(2)}</span>
              </div>
              <div class="album-footer">
                <span class="status-badge ${album.is_published ? 'status-published' : 'status-draft'}">
                  ${album.is_published ? 'Published' : 'Draft'}
                </span>
                <div class="album-actions">
                  <a href="/music-store/album/${album.id}.html" target="_blank" class="btn-sm">View</a>
                  <button class="btn-sm danger" onclick="deleteAlbum('${album.id}', '${escapeHtml(album.title)}')">Delete</button>
                </div>
              </div>
            </div>
          </div>
        `).join('');
      } catch (e) {
        document.getElementById('albumsGrid').innerHTML = `
          <div class="empty-state">
            <div class="icon">⚠️</div>
            <h3>Could not load albums</h3>
            <p>${escapeHtml(e.message || 'Please try refreshing the page.')}</p>
          </div>
        `;
      }
    }

    async function deleteAlbum(id, title) {
      if (!confirm(`Delete "${title}"? This cannot be undone.`)) return;
      
      try {
        const res = await fetch('/api/albums/' + id, {
          method: 'DELETE',
          headers: { 'Authorization': 'Bearer ' + token }
        });
        
        if (!res.ok) {
          const data = await res.json();
          throw new Error(data.error || 'Could not delete album');
        }
        
        showToast('Album deleted');
        loadAlbums();
      } catch (e) {
        showToast(e.message || 'Error deleting album', 'error');
      }
    }

    function escapeHtml(str) {
      if (!str) return '';
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    loadAlbums();
  </script>
</body>
</html>
