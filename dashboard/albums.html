<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Albums — Artist Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0a; color: #fff; font-family: -apple-system, sans-serif; min-height: 100vh; }
    a { color: inherit; text-decoration: none; }
    .layout { display: flex; min-height: 100vh; }
    .sidebar { width: 240px; background: #111; border-right: 1px solid #1a1a1a; padding: 2rem 0; flex-shrink: 0; position: fixed; height: 100vh; }
    .sidebar-logo { padding: 0 1.5rem 2rem; font-size: 1.1rem; font-weight: 800; border-bottom: 1px solid #1a1a1a; margin-bottom: 1.5rem; }
    .sidebar-logo span { color: #555; }
    .sidebar-nav { display: flex; flex-direction: column; }
    .nav-item { padding: 0.75rem 1.5rem; font-size: 0.9rem; color: #888; display: flex; align-items: center; gap: 0.75rem; transition: all 0.15s; }
    .nav-item:hover { color: #fff; background: #161616; }
    .nav-item.active { color: #fff; background: #1a1a1a; border-right: 2px solid #fff; }
    .main { flex: 1; margin-left: 240px; padding: 2rem 3rem; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2.5rem; }
    .header h1 { font-size: 1.8rem; font-weight: 800; }
    .btn { padding: 0.6rem 1.2rem; border-radius: 6px; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.15s; }
    .btn-primary { background: #fff; color: #000; border: none; }
    .btn-primary:hover { opacity: 0.85; }
    .albums-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
    .album-card { background: #111; border-radius: 12px; overflow: hidden; border: 1px solid #1a1a1a; transition: transform 0.2s; }
    .album-card:hover { transform: translateY(-3px); }
    .album-thumb { aspect-ratio: 1; background: linear-gradient(135deg, #1a1a2e, #16213e); display: flex; align-items: center; justify-content: center; font-size: 3rem; overflow: hidden; }
    .album-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .album-info { padding: 1rem; }
    .album-title { font-weight: 600; margin-bottom: 0.25rem; }
    .album-meta { font-size: 0.8rem; color: #666; margin-bottom: 0.75rem; }
    .album-actions { display: flex; gap: 0.5rem; margin-top: 1rem; }
    .btn-sm { padding: 0.4rem 0.8rem; font-size: 0.75rem; background: #1a1a1a; border: 1px solid #333; color: #888; border-radius: 4px; cursor: pointer; }
    .btn-sm:hover { border-color: #555; color: #fff; }
    .btn-sm.danger { color: #e74c3c; border-color: #e74c3c44; }
    .btn-sm.danger:hover { background: #e74c3c22; }
    .status-badge { font-size: 0.7rem; padding: 0.2rem 0.5rem; border-radius: 4px; }
    .status-published { background: #0f2a1a; color: #2ecc71; }
    .status-draft { background: #1a1a1a; color: #555; }
    .empty-state { text-align: center; padding: 4rem 2rem; color: #444; }
    .empty-state h3 { font-size: 1.2rem; color: #666; margin-bottom: 0.5rem; }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-logo">market<span>.place</span></div>
      <nav class="sidebar-nav">
        <a href="/dashboard/" class="nav-item">📊 Overview</a>
        <a href="/dashboard/albums.html" class="nav-item active">💿 Albums</a>
        <a href="/dashboard/albums-new.html" class="nav-item">➕ New Album</a>
        <a href="/dashboard/orders.html" class="nav-item">📦 Orders</a>
        <a href="/dashboard/settings.html" class="nav-item">⚙️ Settings</a>
      </nav>
    </aside>
    <main class="main">
      <div class="header">
        <h1>Your Albums</h1>
        <a href="/dashboard/albums-new.html" class="btn btn-primary">+ New Album</a>
      </div>
      <div class="albums-grid" id="albumsGrid">
        <div class="empty-state"><h3>Loading...</h3></div>
      </div>
    </main>
  </div>
  <script>
    const token = localStorage.getItem('auth_token');
    if (!token) { window.location.href = '/login.html'; }

    async function loadAlbums() {
      try {
        const res = await fetch('/api/albums?mine=true', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        const data = await res.json();
        const albums = data.albums || [];
        const grid = document.getElementById('albumsGrid');

        if (albums.length === 0) {
          grid.innerHTML = '<div class="empty-state"><h3>No albums yet</h3><p>Create your first album to start selling.</p></div>';
          return;
        }

        grid.innerHTML = albums.map(album => `
          <div class="album-card">
            <div class="album-thumb">${album.cover_image_url ? '<img src="${album.cover_image_url}" alt="">' : '💿'}</div>
            <div class="album-info">
              <div class="album-title">${escapeHtml(album.title)}</div>
              <div class="album-meta">${album.track_count || 0} tracks · ${album.is_name_your_price ? 'Name your price' : '$' + (album.price_cents/100).toFixed(2)}</div>
              <span class="status-badge ${album.is_published ? 'status-published' : 'status-draft'}">${album.is_published ? 'Published' : 'Draft'}</span>
              <div class="album-actions">
                <a href="/dashboard/albums-edit.html?id=${album.id}" class="btn-sm">Edit</a>
                <a href="/album/${album.id}.html" target="_blank" class="btn-sm">View</a>
                <button class="btn-sm danger" onclick="deleteAlbum('${album.id}')">Delete</button>
              </div>
            </div>
          </div>
        `).join('');
      } catch (e) {
        document.getElementById('albumsGrid').innerHTML = '<div class="empty-state"><h3>Error loading albums</h3></div>';
      }
    }

    async function deleteAlbum(id) {
      if (!confirm('Delete this album? This cannot be undone.')) return;
      try {
        await fetch('/api/albums/' + id, {
          method: 'DELETE',
          headers: { 'Authorization': 'Bearer ' + token }
        });
        loadAlbums();
      } catch (e) { alert('Could not delete album'); }
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    loadAlbums();
  </script>
</body>
</html>
