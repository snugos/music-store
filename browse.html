<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse Music — Music Marketplace</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0a; color: #fff; font-family: -apple-system, sans-serif; min-height: 100vh; }
    a { color: inherit; text-decoration: none; }

    nav { display: flex; justify-content: space-between; align-items: center; padding: 1.5rem 2rem; max-width: 1200px; margin: 0 auto; }
    .logo { font-size: 1.4rem; font-weight: 800; letter-spacing: -0.03em; }
    .logo span { color: #666; }
    .nav-links { display: flex; gap: 2rem; font-size: 0.9rem; color: #666; }
    .nav-links a:hover { color: #fff; }
    .nav-cta { background: #fff; color: #000; padding: 0.6rem 1.2rem; border-radius: 6px; font-weight: 600; font-size: 0.85rem; }

    .page-header { padding: 3rem 2rem; max-width: 1200px; margin: 0 auto; }
    .page-header h1 { font-size: 2.5rem; font-weight: 800; letter-spacing: -0.04em; margin-bottom: 1.5rem; }

    .filters { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 2rem; align-items: center; }
    .search-box { flex: 1; min-width: 200px; }
    .search-box input { width: 100%; padding: 0.75rem 1rem; background: #111; border: 1px solid #333; border-radius: 8px; color: #fff; font-size: 0.9rem; outline: none; }
    .search-box input:focus { border-color: #555; }

    .filter-tags { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .filter-tag { background: #1a1a1a; border: 1px solid #333; padding: 0.5rem 1rem; border-radius: 20px; font-size: 0.8rem; color: #888; cursor: pointer; transition: all 0.15s; }
    .filter-tag:hover, .filter-tag.active { border-color: #fff; color: #fff; }

    .sort-select { background: #1a1a1a; border: 1px solid #333; padding: 0.5rem 1rem; border-radius: 8px; color: #888; font-size: 0.85rem; cursor: pointer; }

    .albums-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1.5rem; padding: 0 2rem 4rem; max-width: 1200px; margin: 0 auto; }
    .album-card { background: #111; border-radius: 10px; overflow: hidden; transition: transform 0.2s; cursor: pointer; }
    .album-card:hover { transform: translateY(-3px); }
    .album-card-art { aspect-ratio: 1; background: linear-gradient(135deg, #1a1a2e, #16213e); display: flex; align-items: center; justify-content: center; font-size: 2.5rem; }
    .album-card-art img { width: 100%; height: 100%; object-fit: cover; }
    .album-card-info { padding: 0.85rem; }
    .album-card-title { font-weight: 600; font-size: 0.9rem; margin-bottom: 0.2rem; }
    .album-card-artist { font-size: 0.75rem; color: #666; margin-bottom: 0.4rem; }
    .album-card-artist a:hover { color: #fff; }
    .album-card-price { font-size: 0.8rem; color: #999; }
    .album-card-price .tag { background: #1a1a1a; padding: 0.15rem 0.5rem; border-radius: 4px; font-size: 0.7rem; color: #666; }

    .empty-state { grid-column: 1 / -1; text-align: center; padding: 4rem 2rem; color: #444; }
    .empty-state h3 { font-size: 1.2rem; margin-bottom: 0.5rem; color: #666; }

    footer { text-align: center; padding: 3rem 2rem; border-top: 1px solid #1a1a1a; color: #444; font-size: 0.8rem; }
  </style>
</head>
<body>

  <nav>
    <a href="/" class="logo">market<span>.place</span></a>
    <div class="nav-links">
      <a href="/browse.html" style="color:#fff;">Browse</a>
      <a href="/register.html">Sell Music</a>
    </div>
    <a href="/login.html" class="nav-cta">Artist Login</a>
  </nav>

  <div class="page-header">
    <h1>Browse Albums</h1>
    <div class="filters">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search artists or albums..." oninput="handleSearch()">
      </div>
      <div class="filter-tags" id="genreFilters">
        <span class="filter-tag active" data-genre="">All</span>
        <span class="filter-tag" data-genre="hip-hop">Hip-Hop</span>
        <span class="filter-tag" data-genre="r&b">R&B</span>
        <span class="filter-tag" data-genre="electronic">Electronic</span>
        <span class="filter-tag" data-genre="pop">Pop</span>
        <span class="filter-tag" data-genre="jazz">Jazz</span>
        <span class="filter-tag" data-genre="rock">Rock</span>
      </div>
      <select class="sort-select" id="sortSelect" onchange="handleSort()">
        <option value="recent">Most Recent</option>
        <option value="price-low">Price: Low to High</option>
        <option value="price-high">Price: High to Low</option>
        <option value="name">Name A-Z</option>
      </select>
    </div>
  </div>

  <div class="albums-grid" id="albumsGrid">
    <div class="empty-state">
      <h3>No albums found</h3>
      <p>Be the first to list music on the marketplace!</p>
    </div>
  </div>

  <footer>
    <p>Built on Zo Space · Payments by Stripe</p>
    <p style="margin-top:0.5rem;">© 2026 Music Marketplace</p>
  </footer>

  <script>
    let allAlbums = [];
    let currentGenre = '';
    let currentSort = 'recent';
    let searchQuery = '';

    async function loadAlbums() {
      const grid = document.getElementById('albumsGrid');
      try {
        const res = await fetch('/api/albums?published=true');
        const data = await res.json();
        allAlbums = data.albums || [];
        renderAlbums();
      } catch (e) {
        grid.innerHTML = '<div class="empty-state"><h3>API not available</h3><p>Make sure the API server is running.</p></div>';
      }
    }

    function renderAlbums() {
      const grid = document.getElementById('albumsGrid');
      let filtered = allAlbums;

      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        filtered = filtered.filter(a => 
          a.title.toLowerCase().includes(q) || 
          (a.artist_name && a.artist_name.toLowerCase().includes(q))
        );
      }

      if (currentGenre) {
        filtered = filtered.filter(a => a.genre === currentGenre);
      }

      switch (currentSort) {
        case 'price-low': filtered.sort((a,b) => a.price_cents - b.price_cents); break;
        case 'price-high': filtered.sort((a,b) => b.price_cents - a.price_cents); break;
        case 'name': filtered.sort((a,b) => a.title.localeCompare(b.title)); break;
        default: filtered.sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
      }

      if (filtered.length === 0) {
        grid.innerHTML = '<div class="empty-state"><h3>No albums found</h3><p>Try adjusting your filters.</p></div>';
        return;
      }

      grid.innerHTML = filtered.map(album => `
        <a href="/album/${album.id}.html" class="album-card">
          <div class="album-card-art">${album.cover_image_url ? '<img src="'+escapeHtml(album.cover_image_url)+'" alt="">' : '🎵'}</div>
          <div class="album-card-info">
            <div class="album-card-title">${escapeHtml(album.title)}</div>
            <div class="album-card-artist">${escapeHtml(album.artist_name || 'Unknown Artist')}</div>
            <div class="album-card-price">
              ${album.is_name_your_price ? '<span class="tag">Name your price</span>' : '$' + (album.price_cents / 100).toFixed(2)}
            </div>
          </div>
        </a>
      `).join('');
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function handleSearch() {
      searchQuery = document.getElementById('searchInput').value;
      renderAlbums();
    }

    document.querySelectorAll('#genreFilters .filter-tag').forEach(tag => {
      tag.addEventListener('click', () => {
        document.querySelectorAll('#genreFilters .filter-tag').forEach(t => t.classList.remove('active'));
        tag.classList.add('active');
        currentGenre = tag.dataset.genre;
        renderAlbums();
      });
    });

    function handleSort() {
      currentSort = document.getElementById('sortSelect').value;
      renderAlbums();
    }

    loadAlbums();
  </script>

</body>
</html>
